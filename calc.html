<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>香水ノート計算機 🧪</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="calc-container">
        <h1>🧪 香水ノート計算機</h1>
    
        <label class="calc-label">🍋 トップノート:</label>
        <input type="text" id="topNotes" class="calc-input" placeholder="例: レモン, ベルガモット">

        <label class="calc-label">🌹 ミドルノート:</label>
        <input type="text" id="middleNotes" class="calc-input" placeholder="例: ローズ, ジャスミン">

        <label class="calc-label">🌲 ラストノート:</label>
        <input type="text" id="lastNotes" class="calc-input" placeholder="例: ムスク, アンバー">

        <button class="btn" onclick="calculatePerfume()" style="width: 100%; margin-top: 20px;">計算する</button>

        <button class="btn" onclick="resetForm()" style="width: 100%; margin-top: 10px; background-color: #30363d; border-color: #8b949e;">リセット</button>

        <div id="resultArea"></div>

        <a href="index.html" class="back-home">← メインページに戻る</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
